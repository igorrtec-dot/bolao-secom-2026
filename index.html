      /* ════════════════════════════════════════════════════════════
         NOVO PARSER: Busca o jogo pelo NOME, não pela linha!
      ════════════════════════════════════════════════════════════ */
      const PALPITES_INICIAIS = (() => {
        const resultado = {};
        PARTICIPANTES_INICIAIS.forEach(p => { resultado[p.id] = {}; });

        CSV_DADOS.split("\n").forEach((linha) => {
          if (!linha.trim()) return;
          const colunas = linha.split(",");
          const nomeJogoRaw = colunas[0].trim();
          
          // Busca o jogo exato no nosso array JOGOS_COPA
          const jogo = JOGOS_COPA.find(j => 
            nomeJogoRaw.includes(j.mandante.split(' ')[0]) && 
            nomeJogoRaw.includes(j.visitante.split(' ')[0])
          );
          
          if (!jogo) return;

          colunas.slice(1).forEach((placarBruto, pIdx) => {
            const participanteId = 101 + pIdx;
            if (!resultado[participanteId]) return;
            const placar = placarBruto.trim();
            if (!placar) return;

            resultado[participanteId][jogo.id] = placar.toLowerCase().replace("x", "-");
          });
        });
        return resultado;
      })();
      
      /* ════════════════════════════════════════════════════════════
         UTILITÁRIOS DE EXPORTAÇÃO
      ════════════════════════════════════════════════════════════ */
      const baixarCSV = (linhas, nomeArquivo) => {
        const conteudo = linhas.map(r => r.join(";")).join("\r\n");
        const blob = new Blob(["\uFEFF" + conteudo], { type: "text/csv;charset=utf-8;" });
        const url  = URL.createObjectURL(blob);
        const a    = Object.assign(document.createElement("a"), { href: url, download: nomeArquivo + ".csv" });
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      const exportarImagem = async (elementId, nomeArquivo, isDark) => {
        const el = document.getElementById(elementId);
        if (!el) { alert("Elemento não encontrado."); return; }
        try {
          const canvas = await html2canvas(el, {
            backgroundColor: isDark ? "#1e293b" : "#ffffff",
            scale: 2,
            useCORS: true,
          });
          const a = Object.assign(document.createElement("a"), {
            href: canvas.toDataURL("image/png"),
            download: nomeArquivo + ".png",
          });
          a.click();
        } catch (err) {
          alert("Erro ao gerar imagem: " + err.message);
        }
      };

      /* ════════════════════════════════════════════════════════════
         COMPONENTES AUXILIARES
      ════════════════════════════════════════════════════════════ */
      const LogoFIFA = ({ size = "header" }) => (
        <div className={`app-logo-wrap app-logo-${size}`}>
          <img src="Logo.jpg" alt="Copa do Mundo FIFA 2026" loading="eager" />
        </div>
      );

      const PtsPill = ({ pts }) => {
        const config = {
          5: { bg: C.blue,  label: "5P" },
          3: { bg: C.green, label: "3P" },
          0: { bg: C.red,   label: "0P" },
        }[pts] || { bg: C.red, label: "0P" };

        return (
          <span style={{
            background: config.bg, color: "#fff",
            borderRadius: 3, padding: "1px 5px",
            fontSize: 10, fontWeight: 800,
            fontFamily: "'Barlow Condensed', sans-serif",
            letterSpacing: 0.5,
          }}>
            {config.label}
          </span>
        );
      };

      /* ════════════════════════════════════════════════════════════
         COMPONENTE PRINCIPAL — BOLÃO
      ════════════════════════════════════════════════════════════ */
      function Bolao() {

        const lsGet = (chave, padrao) => {
          try {
            const v = localStorage.getItem(chave);
            return v !== null ? JSON.parse(v) : padrao;
          } catch {
            return padrao;
          }
        };
        const lsSet = (chave, valor) => {
          try { localStorage.setItem(chave, JSON.stringify(valor)); } catch {}
        };

        const [isDarkMode, setIsDarkMode] = useState(() => lsGet("secom_dark", false));
        const [aba, setAba] = useState("classificacao");
        const [nomeInput, setNomeInput] = useState("");
        const [resultadoInputs, setResultadoInputs] = useState({});
        const [erros, setErros] = useState({});
        const [grupoFiltro, setGrupoFiltro] = useState("A");
        const [participanteFiltro, setParticipanteFiltro] = useState(null);
        const [syncStatus, setSyncStatus] = useState("idle"); 
        const [syncMsg, setSyncMsg]       = useState("");
        const [ultimaSync, setUltimaSync] = useState(null);
        const [autoSync, setAutoSync]     = useState(false);
        const [jogosAoVivo, setJogosAoVivo] = useState({});
        const [bracketSubAba, setBracketSubAba] = useState("esquerdo");

        const [participantes, setParticipantes] = useState(() => lsGet("secom_participantes", PARTICIPANTES_INICIAIS));
        const [palpites, setPalpites]           = useState(() => lsGet("secom_palpites", PALPITES_INICIAIS));
        const [resultados, setResultados]       = useState(() => lsGet("secom_resultados", {}));

        const chartRef = useRef(null);

        useEffect(() => {
          lsSet("secom_dark", isDarkMode);
          document.body.classList.toggle("dark-mode", isDarkMode);
        }, [isDarkMode]);

        useEffect(() => {
          const t = setTimeout(() => document.getElementById("splash-screen")?.classList.add("hide"), 2000);
          return () => clearTimeout(t);
        }, []);

        useEffect(() => { lsSet("secom_participantes", participantes); }, [participantes]);
        useEffect(() => { lsSet("secom_palpites", palpites); },         [palpites]);
        useEffect(() => { lsSet("secom_resultados", resultados); },     [resultados]);

        const tabelaOficialCopa = useMemo(() => {
          const dadosPorGrupo = {};
          GRUPOS.forEach(g => { dadosPorGrupo[g] = {}; });

          const inicializarTime = (grupo, nome) => {
            if (!dadosPorGrupo[grupo][nome]) {
              dadosPorGrupo[grupo][nome] = { nome, p:0, j:0, v:0, e:0, d:0, gp:0, gc:0, sg:0 };
            }
            return dadosPorGrupo[grupo][nome];
          };

          JOGOS_COPA.forEach(jogo => {
            const tM = inicializarTime(jogo.grupo, jogo.mandante);
            const tV = inicializarTime(jogo.grupo, jogo.visitante);

            const res = resultados[jogo.id];
            if (!res || !validarPlacar(res)) return;

            const [gM, gV] = res.split("-").map(Number);
            tM.j++; tV.j++;
            tM.gp += gM; tM.gc += gV;
            tV.gp += gV; tV.gc += gM;

            if (gM > gV)      { tM.p += 3; tM.v++; tV.d++; }
            else if (gM < gV) { tV.p += 3; tV.v++; tM.d++; }
            else               { tM.p++; tV.p++; tM.e++; tV.e++; }

            tM.sg = tM.gp - tM.gc;
            tV.sg = tV.gp - tV.gc;
          });

          const ordenado = {};
          GRUPOS.forEach(g => {
            ordenado[g] = Object.values(dadosPorGrupo[g]).sort(
              (a, b) => b.p - a.p || b.sg - a.sg || b.gp - a.gp || a.nome.localeCompare(b.nome)
            );
          });
          return ordenado;
        }, [resultados]);

        const classificacao = useMemo(() => {
          const jogosOrdenados = [...JOGOS_COPA].sort(
            (a, b) => parseDateTime(a.data, a.hora) - parseDateTime(b.data, b.hora)
          );

          const lista = participantes.map(p => {
            let total    = 0;
            let exatos   = 0;
            let acertos  = 0;
            let streakAcertos = 0;
            let streakErros   = 0;

            jogosOrdenados.forEach(jogo => {
              const res = resultados[jogo.id];
              if (!res) return;

              const palpite = palpites[p.id]?.[jogo.id];
              const pts     = calcularPontos(palpite, res);
              if (pts === null) return;

              total += pts;
              if (pts === 5) exatos++;
              if (pts >  0) {
                acertos++;
                streakAcertos++;
                streakErros = 0;
              } else {
                streakErros++;
                streakAcertos = 0;
              }
            });

            let streakIcon = null, streakText = "";
            if (streakAcertos >= 3) {
              streakIcon = "🔥";
              streakText = `${streakAcertos} acertos seguidos!`;
            } else if (streakErros >= 3) {
              streakIcon = "🧊";
              streakText = `${streakErros} erros seguidos...`;
            }

            return { ...p, total, exatos, acertos, streakIcon, streakText, streakAcertos, streakErros };
          }).sort((a, b) => b.total - a.total || b.exatos - a.exatos || b.acertos - a.acertos);

          let pos = 1;
          return lista.map((p, i) => {
            if (i === 0) { p.posicao = 1; }
            else {
              const ant = lista[i - 1];
              const empatado = p.total === ant.total && p.exatos === ant.exatos && p.acertos === ant.acertos;
              p.posicao = empatado ? ant.posicao : ++pos;
            }
            return p;
          });
        }, [participantes, palpites, resultados]);

        const estatisticas = useMemo(() => {
          const jogosFinalizados = JOGOS_COPA.filter(j => resultados[j.id]);
          if (!jogosFinalizados.length || !participantes.length) return null;

          let maxExatos = -1;
          let craques   = [];
          classificacao.forEach(p => {
            if (p.exatos > maxExatos)         { maxExatos = p.exatos; craques = [p.nome]; }
            else if (p.exatos === maxExatos && maxExatos > 0) { craques.push(p.nome); }
          });

          const statsPorJogo = jogosFinalizados.map(jogo => {
            let totalPontos = 0, totalAcertos = 0;
            participantes.forEach(p => {
              const pts = calcularPontos(palpites[p.id]?.[jogo.id], resultados[jogo.id]);
              if (pts !== null) { totalPontos += pts; if (pts > 0) totalAcertos++; }
            });
            return { ...jogo, totalPontos, acertos: totalAcertos };
          });

          const minPontos   = Math.min(...statsPorJogo.map(j => j.totalPontos));
          const maxAcertos  = Math.max(...statsPorJogo.map(j => j.acertos));
          const zebras      = statsPorJogo.filter(j => j.totalPontos === minPontos);
          const faceis      = statsPorJogo.filter(j => j.acertos    === maxAcertos);

          let totalGols = 0;
          jogosFinalizados.forEach(j => {
            const [g1, g2] = resultados[j.id].split("-").map(Number);
            totalGols += g1 + g2;
          });

          return {
            craques: maxExatos > 0 ? craques.join(", ") : "Nenhum ainda",
            maxExatos, zebras, minPontos, faceis, maxAcertos,
            mediaGols: (totalGols / jogosFinalizados.length).toFixed(2),
            totalGols, jogosFinalizados: jogosFinalizados.length,
          };
        }, [participantes, palpites, resultados, classificacao]);

        const bracketData = useMemo(() => {
          const get1 = (g) => {
            const teams = tabelaOficialCopa[g] || [];
            return teams.some(t => t.j > 0) ? teams[0]?.nome || `1º ${g}` : `1º ${g}`;
          };
          const get2 = (g) => {
            const teams = tabelaOficialCopa[g] || [];
            return teams.some(t => t.j > 0) ? teams[1]?.nome || `2º ${g}` : `2º ${g}`;
          };

          const terceiros = GRUPOS
            .map(g => {
              const teams = tabelaOficialCopa[g] || [];
              return teams[2] && teams[2].j > 0 ? { ...teams[2], grupo: g } : null;
            })
            .filter(Boolean)
            .sort((a, b) => b.p - a.p || b.sg - a.sg || b.gp - a.gp)
            .slice(0, 8)
            .map(t => t.nome);

          const getThird = (idx, fallback) => terceiros[idx] || fallback;

          return [
            { m: get2("A"),   v: get2("B") },
            { m: get1("E"),   v: getThird(0, "3º A/B/C/D/F") },
            { m: get1("I"),   v: getThird(1, "3º C/D/F/G/H") },
            { m: get1("F"),   v: get2("C") },
            { m: get2("K"),   v: get2("L") },
            { m: get1("H"),   v: get2("J") },
            { m: get1("D"),   v: getThird(2, "3º B/E/F/I/J") },
            { m: get1("G"),   v: getThird(3, "3º A/E/H/I/J") },
            { m: get1("C"),   v: get2("F") },
            { m: get2("E"),   v: get2("I") },
            { m: get1("A"),   v: getThird(4, "3º C/E/F/H/I") },
            { m: get1("L"),   v: getThird(5, "3º E/H/I/J/K") },
            { m: get1("J"),   v: get2("H") },
            { m: get2("D"),   v: get2("G") },
            { m: get1("B"),   v: getThird(6, "3º E/F/G/I/J") },
            { m: get1("K"),   v: getThird(7, "3º D/E/I/J/L") },
          ];
        }, [tabelaOficialCopa]);

        useEffect(() => {
          if (aba !== "graficos") return;

          const jogosFinalizados = [...JOGOS_COPA]
            .filter(j => resultados[j.id])
            .sort((a, b) => parseDateTime(a.data, a.hora) - parseDateTime(b.data, b.hora));

          if (!jogosFinalizados.length) return;

          const top5 = classificacao.slice(0, 5);
          const labels = [
            "Início",
            ...jogosFinalizados.map((j, i) =>
              `J${i + 1} (${j.mandante.slice(0, 3)}×${j.visitante.slice(0, 3)})`
            ),
          ];

          const coresLinhas = [C.blue, C.green, C.amber, C.red, "#94a3b8"];
          const datasets = top5.map((p, idx) => {
            let acumulado = 0;
            const dados = [0];
            jogosFinalizados.forEach(j => {
              acumulado += calcularPontos(palpites[p.id]?.[j.id], resultados[j.id]) || 0;
              dados.push(acumulado);
            });
            return {
              label: p.nome,
              data: dados,
              borderColor: coresLinhas[idx] || C.blue,
              backgroundColor: coresLinhas[idx] || C.blue,
              tension: 0.3,
              borderWidth: 4, 
              pointRadius: 4,
              pointHoverRadius: 7,
            };
          });

          const ctx = document.getElementById("evolutionChart");
          if (!ctx) return;

          if (chartRef.current) {
            chartRef.current.destroy();
            chartRef.current = null;
          }

          chartRef.current = new Chart(ctx, {
            type: "line",
            data: { labels, datasets },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              interaction: { mode: "index", intersect: false },
              
              /* Animação progressiva em cascata */
              animation: {
                duration: 2000,
                easing: 'easeOutQuart',
                delay: (context) => {
                  let delay = 0;
                  if (context.type === 'data' && context.mode === 'default') {
                    delay = context.dataIndex * 150 + context.datasetIndex * 100;
                  }
                  return delay;
                }
              },

              plugins: {
                legend: {
                  labels: {
                    font: { family: "Barlow", weight: "bold", size: 12 },
                    color: isDarkMode ? "#f1f5f9" : "#111827",
                  },
                },
                tooltip: {
                  callbacks: {
                    label: (ctx) => ` ${ctx.dataset.label}: ${ctx.parsed.y} pts`,
                  },
                },
              },
              scales: {
                y: {
                  beginAtZero: true,
                  grid: { color: isDarkMode ? "#334155" : "#e5e7eb" },
                  ticks: {
                    color: isDarkMode ? "#94a3b8" : "#6b7280",
                    font: { family: "Barlow", weight: "bold" },
                  },
                },
                x: {
                  grid: { color: isDarkMode ? "#334155" : "#e5e7eb" },
                  ticks: {
                    color: isDarkMode ? "#94a3b8" : "#6b7280",
                    font: { family: "Barlow Condensed", size: 11, weight: "bold" },
                    maxRotation: 45,
                  },
                },
              },
            },
          });

          return () => {
            if (chartRef.current) {
              chartRef.current.destroy();
              chartRef.current = null;
            }
          };
        }, [aba, resultados, palpites, classificacao, isDarkMode]);

        const sincronizarAPI = useCallback(async () => {
          setSyncStatus("loading");
          setSyncMsg("Buscando placares...");

          try {
            // Usamos um Proxy gratuito para driblar o bloqueio de CORS da API
            const urlAlvo = "https://api.football-data.org/v4/competitions/WC/matches";
            const proxy = "https://corsproxy.io/?";
            
            const res = await fetch(proxy + encodeURIComponent(urlAlvo), {
              headers: { "X-Auth-Token": API_FOOTBALL_KEY },
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);

            const data  = await res.json();
            const jogos = data.matches || [];
            let atualizados = 0;
            const liveMap   = {};
            const novosRes  = { ...resultados };

            jogos.forEach(m => {
              const mand = normalizarNome(m.homeTeam?.name || "");
              const vis  = normalizarNome(m.awayTeam?.name || "");

              const jogo = JOGOS_COPA.find(
                jl => limpaNome(jl.mandante)  === limpaNome(mand) &&
                      limpaNome(jl.visitante) === limpaNome(vis)
              );
              if (!jogo) return;

              if (["IN_PLAY", "PAUSED", "LIVE"].includes(m.status)) {
                liveMap[jogo.id] = true;
              }

              const h = m.score?.fullTime?.home;
              const a = m.score?.fullTime?.away;
              if (h !== null && h !== undefined && a !== null && a !== undefined) {
                const placar = `${h}-${a}`;
                if (novosRes[jogo.id] !== placar) { novosRes[jogo.id] = placar; atualizados++; }
              }
            });

            /* ════════════════════════════════════════════════════════════
               INJEÇÃO MANUAL DE RESULTADOS (TRAVA DE SEGURANÇA)
               Substitua os placares abaixo pelos resultados oficiais!
            ════════════════════════════════════════════════════════════ */
            const jogosManuais = [
              { mandante: "tcheca", visitante: "mex", placar: "0-3" }, 
              { mandante: "fric", visitante: "ore", placar: "1-0" }, // 'ore' pega KOREA e COREIA
            ];

            jogosManuais.forEach(jm => {
              const jogo = JOGOS_COPA.find(j => 
                // Colocamos um bi-direcional caso os times estejam invertidos no seu sistema!
                (limpaNome(j.mandante).includes(limpaNome(jm.mandante)) && limpaNome(j.visitante).includes(limpaNome(jm.visitante))) ||
                (limpaNome(j.mandante).includes(limpaNome(jm.visitante)) && limpaNome(j.visitante).includes(limpaNome(jm.mandante)))
              );
              
              if (jogo && novosRes[jogo.id] !== jm.placar) {
                // Inverte o placar se o sistema achar o jogo ao contrário do que digitamos
                const isInvertido = limpaNome(jogo.mandante).includes(limpaNome(jm.visitante));
                const placarFinal = isInvertido ? jm.placar.split('-').reverse().join('-') : jm.placar;
                
                novosRes[jogo.id] = placarFinal;
                atualizados++;
              }
            });
            jogosManuais.forEach(jm => {
              // Procura o jogo no JOGOS_COPA usando pedaços do nome para não ter erro
              const jogo = JOGOS_COPA.find(j => 
                limpaNome(j.mandante).includes(limpaNome(jm.mandante)) && 
                limpaNome(j.visitante).includes(limpaNome(jm.visitante))
              );
              
              // Se achar o jogo, injeta o placar à força
              if (jogo && novosRes[jogo.id] !== jm.placar) {
                novosRes[jogo.id] = jm.placar;
                atualizados++;
              }
            });
            setResultados(novosRes);
            setJogosAoVivo(liveMap);
            setUltimaSync(new Date());
            setSyncStatus("ok");
            setSyncMsg(atualizados > 0 ? `${atualizados} placar(es) atualizado(s)!` : "Tudo atualizado.");
          } catch (err) {
            setSyncStatus("erro");
            const msg = err.message.includes("Failed to fetch")
              ? "Sem conexão ou bloqueio CORS — lance placares manualmente."
              : `Falha: ${err.message}`;
            setSyncMsg(msg);
          }
        }, [resultados]);

        useEffect(() => {
          if (!autoSync) return;
          sincronizarAPI();
          const intervalo = setInterval(sincronizarAPI, 3 * 60 * 1000);
          return () => clearInterval(intervalo);
        }, [autoSync, sincronizarAPI]);

        const adicionarParticipante = () => {
          const nome = nomeInput.trim().toUpperCase();
          if (!nome) return;
          if (participantes.some(p => p.nome.toLowerCase() === nome.toLowerCase())) {
            setErros(e => ({ ...e, nome: "Nome já cadastrado." })); return;
          }
          setParticipantes(prev => [...prev, { id: Date.now(), nome }]);
          setNomeInput("");
          setErros(e => ({ ...e, nome: "" }));
        };

        const removerParticipante = (id) => {
          const p = participantes.find(x => x.id === id);
          if (!confirm(`Remover ${p?.nome || "participante"} e todos os palpites?`)) return;
          setParticipantes(prev => prev.filter(x => x.id !== id));
          setPalpites(prev => { const c = { ...prev }; delete c[id]; return c; });
          if (participanteFiltro === id) setParticipanteFiltro(null);
        };

        const resetarDados = () => {
          if (!confirm("Resetar todos os dados para o padrão da planilha da Secom?")) return;
          setParticipantes(PARTICIPANTES_INICIAIS);
          setPalpites(PALPITES_INICIAIS);
          setResultados({});
          setJogosAoVivo({});
        };

        const setPalpite = (participanteId, jogoId, valor) =>
          setPalpites(prev => ({
            ...prev,
            [participanteId]: { ...(prev[participanteId] || {}), [jogoId]: valor },
          }));

        const aplicarResultado = (jogoId) => {
          const valor = normalizarPlacar(resultadoInputs[jogoId] || "");
          if (!validarPlacar(valor)) {
            setErros(e => ({ ...e, [`r${jogoId}`]: "Formato inválido. Use 2-1 ou 2x1" }));
            return;
          }
          setResultados(prev => ({ ...prev, [jogoId]: valor }));
          setResultadoInputs(prev => ({ ...prev, [jogoId]: "" }));
          setErros(e => ({ ...e, [`r${jogoId}`]: "" }));
        };

        const jogosFiltrados = useMemo(
          () => JOGOS_COPA.filter(j => j.grupo === grupoFiltro),
          [grupoFiltro]
        );

        const jogosOK   = JOGOS_COPA.filter(j => resultados[j.id]).length;
        const medalha   = (pos) => ["🥇", "🥈", "🥉"][pos - 1] || `${pos}º`;
        const syncCor   = { ok: C.green, erro: C.red, loading: C.amber, idle: "#94a3b8" }[syncStatus];
        const syncLabel = { loading: "Buscando placares...", ok: syncMsg, erro: syncMsg, idle: "Pronto para sincronizar." }[syncStatus];

        const ABAS = [
          { id: "classificacao", label: "Rank",      icon: "🏆", long: "Classificação" },
          { id: "palpites",      label: "Apostas",   icon: "📝", long: "Palpites"      },
          { id: "resultados",    label: "Placar",    icon: "⚽", long: "Resultados"    },
          { id: "participantes", label: "Galera",    icon: "👥", long: "Participantes" },
          { id: "chaveamento",   label: "Chaves",    icon: "🌳", long: "Chaveamento"   },
          { id: "graficos",      label: "Gráfico",   icon: "📈", long: "Gráficos"      },
        ];

        const pctJogos = Math.round((jogosOK / JOGOS_COPA.length) * 100);

        return (
          <div className="app-shell">

            {/* ══ HEADER MOBILE ═══════════════════════════════════ */}
            <header className="app-header">
              <div className="app-header-row">
                <div className="app-header-brand">
                  <LogoFIFA size="header" />
                  <div style={{ minWidth: 0 }}>
                    <h1 className="app-header-title">Bolão SECOM</h1>
                    <div className="app-header-sub">Copa 2026 · {jogosOK}/{JOGOS_COPA.length} jogos</div>
                  </div>
                </div>
                <div className="app-header-actions">
                  <button type="button" className="icon-btn" onClick={() => setIsDarkMode(d => !d)} title="Tema">
                    {isDarkMode ? "🌙" : "☀️"}
                  </button>
                  <button type="button" className="icon-btn primary" onClick={sincronizarAPI} disabled={syncStatus === "loading"} title="Sync">
                    {syncStatus === "loading" ? "⏳" : "🔄"}
                  </button>
                </div>
              </div>

              <div className="progress-wrap">
                <div className="progress-label">
                  <span>Progresso da copa</span>
                  <span>{pctJogos}%</span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{ width: `${pctJogos}%` }} />
                </div>
              </div>

              <div className="sync-bar">
                <div className="sync-status">
                  <span className="sync-dot" style={{ background: syncCor }} />
                  <span className="sync-text" style={{ color: syncCor }}>{syncLabel}</span>
                  {ultimaSync && (
                    <span style={{ fontSize: 9, color: "rgba(255,255,255,0.3)", marginLeft: 4 }}>
                      {ultimaSync.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" })}
                    </span>
                  )}
                </div>
                <div className="sync-actions">
                  <label className="sync-toggle">
                    <input type="checkbox" checked={autoSync} onChange={e => setAutoSync(e.target.checked)} />
                    Auto
                  </label>
                  <button type="button" className="desktop-only theme-btn" onClick={resetarDados} style={{ fontSize: 10, padding: "4px 8px" }}>
                    ↺ Reset
                  </button>
                </div>
              </div>
            </header>

            {/* Abas desktop (ocultas no mobile) */}
            <div style={{ background: C.blue, boxShadow: "0 2px 8px rgba(26,110,245,.3)" }} className="desktop-only">
              <div className="tabs-wrapper" style={{ maxWidth: 1060, margin: "0 auto", padding: "0 16px", gap: 2 }}>
                {ABAS.map(a => (
                  <button
                    key={a.id}
                    onClick={() => setAba(a.id)}
                    style={{
                      background: aba === a.id ? "var(--bg-card)" : "transparent",
                      color: aba === a.id ? C.blue : "rgba(255,255,255,.75)",
                      border: "none", padding: "12px 18px",
                      fontFamily: "'Barlow Condensed',sans-serif", fontSize: 14, fontWeight: 800,
                      textTransform: "uppercase", cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0,
                      borderRadius: aba === a.id ? "6px 6px 0 0" : "0",
                    }}
                  >
                    {a.long}
                  </button>
                ))}
              </div>
            </div>

            <main className="app-main">

              {/* ─────────────────────────────────────────────────
                 ABA: CLASSIFICAÇÃO
              ───────────────────────────────────────────────── */}
              {aba === "classificacao" && (
                <div className="anim-cascade">
                  {estatisticas && (
                    <div className="scroll-carousel">
                      <div className="stat-card" style={{ borderLeft: `4px solid ${C.blue}` }}>
                        <div className="stat-icon">🌟</div>
                        <div className="stat-title">Craque</div>
                        <div className="stat-value">{estatisticas.craques}</div>
                        <div className="stat-sub">{estatisticas.maxExatos} cravados</div>
                      </div>
                      <div className="stat-card" style={{ borderLeft: `4px solid ${C.green}` }}>
                        <div className="stat-icon">🎯</div>
                        <div className="stat-title">Jogo fácil</div>
                        {estatisticas.faceis.slice(0, 1).map((j, i) => (
                          <div key={i} className="stat-value">{j.mandante.slice(0, 3)} × {j.visitante.slice(0, 3)}</div>
                        ))}
                        <div className="stat-sub">{estatisticas.maxAcertos} acertaram</div>
                      </div>
                      <div className="stat-card" style={{ borderLeft: `4px solid ${C.red}` }}>
                        <div className="stat-icon">🦓</div>
                        <div className="stat-title">Zebra</div>
                        {estatisticas.zebras.slice(0, 1).map((j, i) => (
                          <div key={i} className="stat-value">{j.mandante.slice(0, 3)} × {j.visitante.slice(0, 3)}</div>
                        ))}
                        <div className="stat-sub">{estatisticas.minPontos} pts total</div>
                      </div>
                      <div className="stat-card" style={{ borderLeft: `4px solid ${C.amber}` }}>
                        <div className="stat-icon">⚽</div>
                        <div className="stat-title">Média gols</div>
                        <div className="stat-value">{estatisticas.mediaGols}</div>
                        <div className="stat-sub">{estatisticas.totalGols} gols</div>
                      </div>
                    </div>
                  )}

                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:10 }}>
                    <h2 className="section-title" style={{ margin: 0 }}>Ranking</h2>
                    <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                      <button
                        style={{ background:C.blue, color:"#fff", border:"none", borderRadius:7, padding:"9px 18px", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:13, cursor:"pointer", letterSpacing:.5, textTransform:"uppercase" }}
                        onClick={() => {
                          const cab = ["Pos","Participante","Pts","Exatos","Acertos"];
                          const lin = classificacao.map(p => [p.posicao, p.nome, p.total, p.exatos, p.acertos]);
                          baixarCSV([cab, ...lin], "Classificacao_Secom");
                        }}
                      >
                        📥 CSV
                      </button>
                      <button
                        style={{ background:"var(--btn-out-bg)", color:C.blue, border:`1.5px solid ${C.blue}`, borderRadius:7, padding:"9px 16px", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:13, cursor:"pointer", letterSpacing:.5 }}
                        onClick={() => exportarImagem("rank-print", "Ranking_Secom", isDarkMode)}
                      >
                        📸 Ranking
                      </button>
                    </div>
                  </div>

                  <div style={{ display:"flex", gap:14, marginBottom:16, flexWrap:"wrap", alignItems:"center" }}>
                    {[[5, C.blue, "Placar exato"], [3, C.green, "Acertou vencedor"], [0, C.red, "Errou"]].map(([v, bg, txt]) => (
                      <span key={v} style={{ display:"flex", alignItems:"center", gap:5, fontSize:12, color:"var(--text-muted)", fontWeight:600 }}>
                        <span style={{ background:bg, color:"#fff", borderRadius:3, padding:"1px 6px", fontSize:10, fontWeight:800, fontFamily:"'Barlow Condensed',sans-serif" }}>{v} PTS</span>
                        {txt}
                      </span>
                    ))}
                  </div>

                  <div className="dashboard-grid">
                    <div id="rank-print" style={{ background:"var(--bg-card)", borderRadius:12, border:"1px solid var(--border-color)", padding:"16px", boxShadow:"var(--shadow-card)" }}>
                      {classificacao.length === 0
                        ? <div style={{ textAlign:"center", color:"var(--text-muted)", padding:"30px 0" }}>Sem participantes cadastrados.</div>
                        : classificacao.map((p, i) => (
                          <div
                            key={p.id}
                            style={{
                              display:"flex", alignItems:"center", gap:12, padding:"12px 16px",
                              borderBottom: i < classificacao.length - 1 ? "1px solid var(--border-color)" : "none",
                              background: p.posicao === 1 ? "var(--bg-top1)" : p.posicao === 2 ? "var(--bg-top2)" : p.posicao === 3 ? "var(--bg-top3)" : "transparent",
                              borderRadius: p.posicao <= 3 ? 8 : 0,
                            }}
                          >
                            <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:20, fontWeight:900, width:36, textAlign:"center", color: p.posicao === 1 ? C.blue : p.posicao === 2 ? "#64748b" : p.posicao === 3 ? "#b45309" : "var(--text-muted)", flexShrink:0 }}>
                              {medalha(p.posicao)}
                            </div>

                            <div style={{ flex:1, minWidth:0 }}>
                              <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                                <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:16, textTransform:"uppercase", letterSpacing:.5, color:"var(--text-main)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                                  {p.nome}
                                </span>
                                {p.posicao === 1 && (
                                  <span title="Líder absoluto" style={{ fontSize:14 }}>👑</span>
                                )}
                                {i === classificacao.length - 1 && classificacao.length > 1 && (
                                  <span title="Lanterna" style={{ fontSize:14 }}>🔦</span>
                                )}
                                {p.streakIcon && (
                                  <div className="badge-tooltip">
                                    <span style={{ fontSize:13 }}>
                                      {p.streakIcon}
                                      <span style={{ fontSize:11, fontWeight:"bold", color: p.streakIcon === "🔥" ? C.amber : C.blue, marginLeft:2 }}>
                                        {p.streakIcon === "🔥" ? p.streakAcertos : p.streakErros}
                                      </span>
                                    </span>
                                    <span className="tooltiptext">{p.streakText}</span>
                                  </div>
                                )}
                              </div>
                              <div style={{ fontSize:11, color:"var(--text-muted)", marginTop:2 }}>
                                🎯 {p.exatos} exatos &nbsp;·&nbsp; ✅ {p.acertos} acertos
                              </div>
                            </div>

                            <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:26, fontWeight:900, color: p.posicao === 1 ? C.blue : "var(--text-main)", minWidth:72, textAlign:"right", flexShrink:0 }}>
                              {p.total}
                              <span style={{ fontSize:12, fontWeight:600, color:"var(--text-muted)", marginLeft:2 }}>PTS</span>
                            </div>
                          </div>
                        ))
                      }
                    </div>

                    <div className="stats-sidebar">
                      <h3 style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:17, fontWeight:900, textTransform:"uppercase", color:"var(--text-main)", margin:"0 0 4px" }}>
                        📊 Resumo da Copa
                      </h3>
                      {!estatisticas
                        ? <div className="stat-card"><div style={{ textAlign:"center", color:"var(--text-muted)", padding:"20px 0" }}>Aguardando resultados.</div></div>
                        : (
                          <>
                            <div className="stat-card" style={{ borderLeft:`4px solid ${C.blue}` }}>
                              <div className="stat-icon">🌟</div>
                              <div className="stat-title">Craque do Bolão</div>
                              <div className="stat-value">{estatisticas.craques}</div>
                              <div className="stat-sub">{estatisticas.maxExatos} placares exatos</div>
                            </div>
                            <div className="stat-card" style={{ borderLeft:`4px solid ${C.green}` }}>
                              <div className="stat-icon">🎯</div>
                              <div className="stat-title">Jogo Mais Fácil</div>
                              {estatisticas.faceis.slice(0, 1).map((j, i) => (
                                <div key={i} className="stat-value" style={{ fontSize:16 }}>{j.mandante} × {j.visitante}</div>
                              ))}
                              <div className="stat-sub">{estatisticas.maxAcertos} participantes pontuaram</div>
                            </div>
                            <div className="stat-card" style={{ borderLeft:`4px solid ${C.red}` }}>
                              <div className="stat-icon">🦓</div>
                              <div className="stat-title">A Grande Zebra</div>
                              {estatisticas.zebras.slice(0, 1).map((j, i) => (
                                <div key={i} className="stat-value" style={{ fontSize:16 }}>{j.mandante} × {j.visitante}</div>
                              ))}
                              <div className="stat-sub">Apenas {estatisticas.minPontos} pts somados</div>
                            </div>
                            <div className="stat-card" style={{ borderLeft:`4px solid ${C.amber}` }}>
                              <div className="stat-icon">⚽</div>
                              <div className="stat-title">Média de Gols</div>
                              <div className="stat-value">{estatisticas.mediaGols}</div>
                              <div className="stat-sub">{estatisticas.totalGols} gols em {estatisticas.jogosFinalizados} jogos</div>
                            </div>
                          </>
                        )
                      }
                    </div>
                  </div>

                  <div style={{ marginTop:32 }}>
                    <h3 style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:14, fontWeight:900, textTransform:"uppercase", color:"var(--text-muted)", margin:"0 0 10px", letterSpacing:1 }}>
                      Filtrar por Grupo
                    </h3>
                    <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                      {GRUPOS.map(g => (
                        <button
                          key={g}
                          onClick={() => setGrupoFiltro(g)}
                          style={{
                            background: grupoFiltro === g ? C.blue : "var(--bg-card)",
                            border: `1.5px solid ${grupoFiltro === g ? C.blue : "var(--border-color)"}`,
                            borderRadius:20, padding:"5px 14px", fontSize:12, fontWeight:700, cursor:"pointer",
                            fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:.5,
                            color: grupoFiltro === g ? "#fff" : "var(--text-muted)",
                          }}
                        >
                          {g}
                        </button>
                      ))}
                    </div>
                  </div>

                  {participantes.length > 0 && (
                    <div className="tables-split-container">
                      <div>
                        <h3 style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:14, textTransform:"uppercase", fontWeight:900, color:"var(--text-main)", marginBottom:10 }}>
                          👥 Palpites do Bolão — Grupo {grupoFiltro}
                        </h3>
                        <div style={{ background:"var(--bg-card)", borderRadius:10, border:"1px solid var(--border-color)", padding:12, overflowX:"auto" }}>
                          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
                            <thead>
                              <tr style={{ background:"var(--header-bg)" }}>
                                <th style={{ padding:"8px 10px", textAlign:"left", color:"#fff", fontWeight:"bold", whiteSpace:"nowrap" }}>Nome</th>
                                {jogosFiltrados.map(j => (
                                  <th key={j.id} style={{ padding:"8px 6px", textAlign:"center", color:"#fff", fontWeight:"bold", whiteSpace:"nowrap" }}>
                                    <div>{j.mandante.slice(0,3)} × {j.visitante.slice(0,3)}</div>
                                    {resultados[j.id] && (
                                      <div style={{ background:C.blue, color:"#fff", borderRadius:3, fontSize:10, padding:"1px 4px", marginTop:2 }}>
                                        {resultados[j.id]}
                                      </div>
                                    )}
                                  </th>
                                ))}
                              </tr>
                            </thead>
                            <tbody>
                              {classificacao.map((p, ri) => (
                                <tr key={p.id} style={{ background: ri % 2 === 0 ? "var(--bg-card)" : "var(--bg-row-even)" }}>
                                  <td style={{ padding:"8px 10px", fontWeight:700, color:"var(--text-main)", whiteSpace:"nowrap" }}>{p.nome}</td>
                                  {jogosFiltrados.map(j => {
                                    const pal = palpites[p.id]?.[j.id];
                                    const pts = calcularPontos(pal, resultados[j.id]);
                                    return (
                                      <td key={j.id} style={{ padding:"6px", textAlign:"center" }}>
                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:3, flexWrap:"nowrap" }}>
                                          <span style={{ fontFamily:"monospace", fontWeight:800, color:"var(--text-main)", fontSize:11 }}>{pal || "—"}</span>
                                          {pts !== null && <PtsPill pts={pts} />}
                                        </div>
                                      </td>
                                    );
                                  })}
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>

                      <div>
                        <h3 style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:14, textTransform:"uppercase", fontWeight:900, color:"var(--text-main)", marginBottom:10 }}>
                          🏆 Classificação Real — Grupo {grupoFiltro}
                        </h3>
                        <div style={{ background:"var(--bg-card)", borderRadius:10, border:"1px solid var(--border-color)", padding:12 }}>
                          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, textAlign:"center" }}>
                            <thead>
                              <tr style={{ background:"var(--header-bg)", color:"#fff" }}>
                                {["Seleção","P","J","V","E","D","SG"].map(col => (
                                  <th key={col} style={{ padding:"8px 6px", fontWeight:"bold", textAlign: col === "Seleção" ? "left" : "center" }}>{col}</th>
                                ))}
                              </tr>
                            </thead>
                            <tbody>
                              {(tabelaOficialCopa[grupoFiltro] || []).map((time, idx) => (
                                <tr key={idx} style={{ background: idx % 2 === 0 ? "var(--bg-card)" : "var(--bg-row-even)" }}>
                                  <td style={{ padding:"8px 6px", textAlign:"left", fontWeight:700, color:"var(--text-main)", borderBottom:"1px solid var(--border-color)" }}>
                                    <span style={{ marginRight:6, color: idx < 2 ? C.green : "var(--text-muted)", fontWeight:900 }}>{idx+1}º</span>
                                    {time.nome}
                                  </td>
                                  <td style={{ padding:"8px 4px", borderBottom:"1px solid var(--border-color)", fontWeight:900, color:C.blue }}>{time.p}</td>
                                  <td style={{ padding:"8px 4px", borderBottom:"1px solid var(--border-color)", color:"var(--text-main)" }}>{time.j}</td>
                                  <td style={{ padding:"8px 4px", borderBottom:"1px solid var(--border-color)", color:"var(--text-main)" }}>{time.v}</td>
                                  <td style={{ padding:"8px 4px", borderBottom:"1px solid var(--border-color)", color:"var(--text-main)" }}>{time.e}</td>
                                  <td style={{ padding:"8px 4px", borderBottom:"1px solid var(--border-color)", color:"var(--text-main)" }}>{time.d}</td>
                                  <td style={{ padding:"8px 4px", borderBottom:"1px solid var(--border-color)", fontWeight:700, color: time.sg > 0 ? C.green : time.sg < 0 ? C.red : "var(--text-main)" }}>
                                    {time.sg > 0 ? `+${time.sg}` : time.sg}
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>

                    </div>
                  )}
                </div>
              )}

              {/* ─────────────────────────────────────────────────
                 ABA: PALPITES
              ───────────────────────────────────────────────── */}
              {aba === "palpites" && (
                <div className="anim-cascade">
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:10 }}>
                    <h2 style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:900, letterSpacing:1, textTransform:"uppercase", color:"var(--text-main)", margin:0 }}>
                      Registrar Palpites
                    </h2>
                    <button
                      style={{ background:C.blue, color:"#fff", border:"none", borderRadius:7, padding:"9px 18px", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:13, cursor:"pointer", letterSpacing:.5, textTransform:"uppercase" }}
                      onClick={() => {
                        const cab = ["PARTIDAS", ...participantes.map(p => p.nome)];
                        const lin = JOGOS_COPA.map(j => [
                          `${j.mandante} × ${j.visitante}`,
                          ...participantes.map(p => palpites[p.id]?.[j.id] || ""),
                        ]);
                        baixarCSV([cab, ...lin], "Palpites_Secom");
                      }}
                    >
                      📥 Exportar CSV
                    </button>
                  </div>

                  {[
                    {
                      label: "PARTICIPANTE",
                      btns: [
                        { id: null, nome: "Todos" },
                        ...participantes,
                      ],
                      ativo: participanteFiltro,
                      setAtivo: setParticipanteFiltro,
                    },
                    {
                      label: "GRUPO",
                      btns: GRUPOS.map(g => ({ id: g, nome: g })),
                      ativo: grupoFiltro,
                      setAtivo: setGrupoFiltro,
                    },
                  ].map(filtro => (
                    <div key={filtro.label} style={{ display:"flex", alignItems:"flex-start", gap:10, marginBottom:12, flexWrap:"wrap" }}>
                      <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:11, fontWeight:800, letterSpacing:1.5, textTransform:"uppercase", color:"var(--text-muted)", paddingTop:6, minWidth:90, flexShrink:0 }}>
                        {filtro.label}
                      </span>
                      <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                        {filtro.btns.map(b => (
                          <button
                            key={b.id ?? "todos"}
                            onClick={() => filtro.setAtivo(b.id)}
                            style={{
                              background: filtro.ativo === b.id ? C.blue : "var(--bg-card)",
                              border: `1.5px solid ${filtro.ativo === b.id ? C.blue : "var(--border-color)"}`,
                              borderRadius:20, padding:"5px 13px", fontSize:12, fontWeight:700, cursor:"pointer",
                              fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:.5,
                              color: filtro.ativo === b.id ? "#fff" : "var(--text-muted)",
                            }}
                          >
                            {b.nome}
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}

                  {(participanteFiltro !== null
                    ? participantes.filter(p => p.id === participanteFiltro)
                    : participantes
                  ).map((p, i) => (
                    <div key={p.id} style={{ background:"var(--bg-card)", borderRadius:10, border:"1px solid var(--border-color)", padding:16, marginBottom:10, boxShadow:"var(--shadow-card)" }}>
                      <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:14, letterSpacing:1, textTransform:"uppercase", color:C.blue, paddingBottom:10, marginBottom:8, borderBottom:`2px solid ${C.blue}` }}>
                        {p.nome}
                      </div>

                      {jogosFiltrados.map((j, ji) => {
                        const val = palpites[p.id]?.[j.id] || "";
                        const res = resultados[j.id];
                        const pts = res ? calcularPontos(val, res) : null;

                        const isReadOnly = Boolean(res) || jogoJaComecou(j);
                        let customClass = "";
                        let inputStyle = {
                          width:70, borderRadius:6, padding:"8px 0", fontSize:15,
                          textAlign:"center", outline:"none", fontFamily:"monospace", fontWeight:800,
                          border: "2px solid var(--border-color)",
                          background: "var(--bg-input)", color: "var(--text-main)",
                        };

                        if (isReadOnly) {
                          if (pts === 5) customClass = "score-5pt";
                          else if (pts === 3) customClass = "score-3pt";
                          else customClass = "score-0pt";
                          inputStyle = {};
                        } else {
                          inputStyle.background = validarPlacar(val) ? "var(--bg-input-focus)" : "var(--bg-input)";
                          inputStyle.borderColor = validarPlacar(val) ? C.blue : "var(--border-color)";
                          inputStyle.color       = validarPlacar(val) ? C.blue : "var(--text-main)";
                        }

                        return (
                          <div
                            key={j.id}
                            style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 0", borderBottom: ji < jogosFiltrados.length - 1 ? "1px solid var(--border-color)" : "none" }}
                          >
                            <div style={{ flex:1, minWidth:0 }}>
                              <div style={{ fontWeight:700, fontSize:14, color:"var(--text-main)", fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:.3 }}>
                                {j.mandante} <span style={{ color:"var(--text-muted)", fontWeight:400 }}>×</span> {j.visitante}
                                {jogosAoVivo[j.id] && <span className="live-badge" style={{ marginLeft:6 }}>🔴 AO VIVO</span>}
                              </div>
                              <div style={{ fontSize:11, color:"var(--text-muted)", marginTop:2 }}>
                                {j.data} · {j.hora} · {j.local}
                              </div>
                            </div>
                            <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
                              {res && (
                                <span style={{ fontFamily:"monospace", fontSize:12, color:"var(--text-muted)", textDecoration:"line-through" }}>
                                  {res}
                                </span>
                              )}
                              <input
                                className={customClass}
                                style={isReadOnly ? { ...inputStyle, width:70, borderRadius:6, padding:"8px 0", fontSize:15, textAlign:"center", fontFamily:"monospace", fontWeight:800 } : inputStyle}
                                placeholder="0-0"
                                value={val}
                                readOnly={isReadOnly}
                                onChange={e => !isReadOnly && setPalpite(p.id, j.id, e.target.value)}
                                onBlur={e => {
                                  if (isReadOnly) return;
                                  const n = normalizarPlacar(e.target.value);
                                  if (n !== e.target.value) setPalpite(p.id, j.id, n);
                                }}
                              />
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              )}

              {/* ─────────────────────────────────────────────────
                 ABA: RESULTADOS
              ───────────────────────────────────────────────── */}
              {aba === "resultados" && (
                <div className="anim-cascade">
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:10 }}>
                    <h2 style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:900, letterSpacing:1, textTransform:"uppercase", color:"var(--text-main)", margin:0 }}>
                      Placar Oficial
                    </h2>
                    <div style={{ fontSize:12, color:C.green, background:"rgba(22,163,74,.08)", border:`1px solid ${C.green}`, borderRadius:6, padding:"6px 12px", fontWeight:600 }}>
                      🤖 Sync automático tem prioridade. Lance manual só se necessário.
                    </div>
                  </div>

                  <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:16 }}>
                    {GRUPOS.map(g => (
                      <button
                        key={g}
                        onClick={() => setGrupoFiltro(g)}
                        style={{
                          background: grupoFiltro === g ? C.blue : "var(--bg-card)",
                          border: `1.5px solid ${grupoFiltro === g ? C.blue : "var(--border-color)"}`,
                          borderRadius:20, padding:"5px 13px", fontSize:12, fontWeight:700, cursor:"pointer",
                          fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:.5,
                          color: grupoFiltro === g ? "#fff" : "var(--text-muted)",
                        }}
                      >
                        {g}
                      </button>
                    ))}
                  </div>

                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {jogosFiltrados.map((j, i) => (
                      <div
                        key={j.id}
                        className="anim-cascade"
                        style={{ background:"var(--bg-card)", borderRadius:10, border:"1px solid var(--border-color)", padding:16, animationDelay:`${i * 0.04}s`, boxShadow:"var(--shadow-card)" }}
                      >
                        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10 }}>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:16, letterSpacing:.3, color:"var(--text-main)" }}>
                              {j.mandante} <span style={{ color:"var(--text-muted)", fontWeight:400 }}>×</span> {j.visitante}
                              {jogosAoVivo[j.id] && <span className="live-badge" style={{ marginLeft:6 }}>🔴 AO VIVO</span>}
                            </div>
                            <div style={{ fontSize:11, color:"var(--text-muted)", marginTop:2 }}>{j.data} · {j.hora} · {j.local}</div>
                          </div>

                          {resultados[j.id]
                            ? (
                              <div style={{ display:"flex", alignItems:"center", gap:10, flexShrink:0 }}>
                                <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:24, fontWeight:900, color:C.blue, background:"var(--bg-input-focus)", border:`2px solid ${C.blue}`, borderRadius:6, padding:"4px 16px", letterSpacing:1 }}>
                                  {resultados[j.id]}
                                </span>
                                <button
                                  style={{ background:"var(--bg-card)", color:C.red, border:`1px solid ${C.red}`, borderRadius:6, padding:"6px 12px", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:11, cursor:"pointer" }}
                                  onClick={() => setResultados(prev => { const c = { ...prev }; delete c[j.id]; return c; })}
                                >
                                  Limpar
                                </button>
                              </div>
                            )
                            : (
                              <div style={{ display:"flex", gap:8, alignItems:"center", flexShrink:0 }}>
                                <input
                                  style={{ width:72, background:"var(--bg-input)", border:"2px solid var(--border-color)", borderRadius:6, padding:"8px 0", color:"var(--text-main)", fontSize:15, textAlign:"center", outline:"none", fontFamily:"monospace", fontWeight:800 }}
                                  placeholder="2-1"
                                  value={resultadoInputs[j.id] || ""}
                                  onChange={e => setResultadoInputs(prev => ({ ...prev, [j.id]: e.target.value }))}
                                  onKeyDown={e => e.key === "Enter" && aplicarResultado(j.id)}
                                />
                                <button
                                  style={{ background:C.blue, color:"#fff", border:"none", borderRadius:7, padding:"9px 18px", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:13, cursor:"pointer", letterSpacing:.5, textTransform:"uppercase" }}
                                  onClick={() => aplicarResultado(j.id)}
                                >
                                  Salvar
                                </button>
                              </div>
                            )
                          }
                        </div>
                        {erros[`r${j.id}`] && (
                          <div style={{ color:C.red, fontSize:12, marginTop:6, fontWeight:600 }}>⚠️ {erros[`r${j.id}`]}</div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* ─────────────────────────────────────────────────
                 ABA: PARTICIPANTES
              ───────────────────────────────────────────────── */}
              {aba === "participantes" && (
                <div className="anim-cascade">
                  <h2 className="section-title">Galera do Bolão</h2>

                  <div className="btn-row">
                    <button
                      type="button"
                      className="btn-secondary"
                      onClick={() => {
                        const blob = new Blob([JSON.stringify({ participantes, palpites, resultados }, null, 2)], { type: "application/json" });
                        const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(blob), download: "bolao-secom-backup.json" });
                        a.click(); URL.revokeObjectURL(a.href);
                      }}
                    >
                      📤 Backup
                    </button>
                    <button type="button" className="btn-secondary" onClick={resetarDados}>
                      ↺ Reset
                    </button>
                  </div>

                  <div style={{ display:"flex", gap:8, marginBottom:8 }}>
                    <input
                      style={{ flex:1, background:"var(--bg-input)", border:"1.5px solid var(--border-color)", borderRadius:8, padding:"10px 14px", color:"var(--text-main)", fontSize:14, outline:"none", fontFamily:"'Barlow',sans-serif" }}
                      placeholder="Nome do participante..."
                      value={nomeInput}
                      onChange={e => setNomeInput(e.target.value)}
                      onKeyDown={e => e.key === "Enter" && adicionarParticipante()}
                    />
                    <button
                      style={{ background:C.blue, color:"#fff", border:"none", borderRadius:7, padding:"9px 18px", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:13, cursor:"pointer", letterSpacing:.5, textTransform:"uppercase" }}
                      onClick={adicionarParticipante}
                    >
                      Adicionar
                    </button>
                  </div>
                  {erros.nome && <div style={{ color:C.red, fontSize:12, marginBottom:8, fontWeight:600 }}>⚠️ {erros.nome}</div>}

                  <ul style={{ listStyle:"none", padding:0, display:"flex", flexDirection:"column", gap:6 }}>
                    {participantes.map((p, i) => (
                      <li
                        key={p.id}
                        className="anim-cascade"
                        style={{ display:"flex", alignItems:"center", gap:10, background:"var(--bg-card)", border:"1px solid var(--border-color)", borderRadius:8, padding:"10px 14px", animationDelay:`${i * 0.04}s` }}
                      >
                        <span style={{ fontFamily:"'Barlow Condensed',sans-serif", background:C.blue, color:"#fff", borderRadius:4, width:24, height:24, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, flexShrink:0 }}>
                          {i + 1}
                        </span>
                        <span style={{ flex:1, fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:15, letterSpacing:.3, textTransform:"uppercase", color:"var(--text-main)" }}>
                          {p.nome}
                        </span>
                        <span style={{ fontSize:11, color:"var(--text-muted)" }}>
                          {(palpites[p.id] ? Object.keys(palpites[p.id]).length : 0)} palpites
                        </span>
                        <button
                          style={{ background:"transparent", border:`1px solid ${C.red}`, color:C.red, cursor:"pointer", fontSize:12, fontWeight:700, borderRadius:5, padding:"3px 8px" }}
                          onClick={() => removerParticipante(p.id)}
                          title="Remover participante"
                        >
                          ✕
                        </button>
                      </li>
                    ))}
                  </ul>
                </div>
              )}

              {/* ─────────────────────────────────────────────────
                 ABA: CHAVEAMENTO
              ───────────────────────────────────────────────── */}
              {aba === "chaveamento" && (
                <div className="anim-cascade">
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                    <h2 style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:900, letterSpacing:1, textTransform:"uppercase", color:"var(--text-main)", margin:0 }}>
                      Chaveamento — Copa 2026
                    </h2>
                    <div style={{ fontSize:12, color:C.blue, background:"var(--bg-input-focus)", border:`1px solid ${C.blue}`, borderRadius:6, padding:"6px 12px", fontWeight:600 }}>
                      ⚡ Preenchimento automático
                    </div>
                  </div>

                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:4, marginBottom:12 }}>
                    {[{id:"esquerdo",l:"Chave A"},{id:"final",l:"🥇 FINAL"},{id:"direito",l:"Chave B"}].map(b=>(
                      <button key={b.id} onClick={()=>setBracketSubAba(b.id)}
                        style={{
                          background: bracketSubAba===b.id?C.blue:"var(--bg-card)",
                          color: bracketSubAba===b.id?C.white:"var(--text-muted)",
                          border:`1px solid ${bracketSubAba===b.id?C.blue:"var(--border-color)"}`,
                          padding:"6px 0", borderRadius:6, fontSize:11, fontWeight:800, fontFamily:"'Barlow Condensed'"
                        }}>{b.l}</button>
                    ))}
                  </div>

                  <div style={{ background:"var(--bg-card)", borderRadius:12, border:"1px solid var(--border-color)", padding:16, boxShadow:"var(--shadow-card)" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", width:"100%", minHeight:580, gap:8 }}>

                      {/* VISÃO DA CHAVE ESQUERDA */}
                      {bracketSubAba==="esquerdo" && (
                        <div style={{ display:"flex", gap:8, flex:1, minWidth:0 }}>
                          <div className="bracket-col">
                            {bracketData.slice(0, 8).map((m, i) => (
                              <div key={i} className="bracket-match anim-cascade" style={{ animationDelay: `${i * 0.05}s` }}>
                                <div className="bracket-team">{m.m}</div>
                                <div className="bracket-team">{m.v}</div>
                              </div>
                            ))}
                          </div>
                          {[4, 2, 1].map((n, colIdx) => (
                            <div key={n} className="bracket-col">
                              {Array.from({ length: n }).map((_, i) => (
                                <div key={i} className="bracket-match anim-cascade" style={{ animationDelay: `${0.3 + (colIdx * 0.15) + (i * 0.05)}s` }}>
                                  <div className="bracket-team" style={{ color:"var(--text-muted)" }}>A Definir</div>
                                  <div className="bracket-team" style={{ color:"var(--text-muted)" }}>A Definir</div>
                                </div>
                              ))}
                            </div>
                          ))}
                        </div>
                      )}

                      {/* VISÃO DA CHAVE DIREITA */}
                      {bracketSubAba==="direito" && (
                        <div style={{ display:"flex", gap:8, flexDirection:"row-reverse", flex:1, minWidth:0 }}>
                          <div className="bracket-col">
                            {bracketData.slice(8, 16).map((m, i) => (
                              <div key={i} className="bracket-match anim-cascade" style={{ animationDelay: `${i * 0.05}s` }}>
                                <div className="bracket-team">{m.m}</div>
                                <div className="bracket-team">{m.v}</div>
                              </div>
                            ))}
                          </div>
                          {[4, 2, 1].map((n, colIdx) => (
                            <div key={n} className="bracket-col">
                              {Array.from({ length: n }).map((_, i) => (
                                <div key={i} className="bracket-match anim-cascade" style={{ animationDelay: `${0.3 + (colIdx * 0.15) + (i * 0.05)}s` }}>
                                  <div className="bracket-team" style={{ color:"var(--text-muted)" }}>A Definir</div>
                                  <div className="bracket-team" style={{ color:"var(--text-muted)" }}>A Definir</div>
                                </div>
                              ))}
                            </div>
                          ))}
                        </div>
                      )}

                      {/* VISÃO CENTRAL DA GRANDE FINAL */}
                      {bracketSubAba==="final" && (
                        <div style={{ textAlign:"center", padding:"40px 0", width: "100%" }}>
                          <div className="anim-cascade" style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, color:C.amber, fontSize:20, marginBottom:14, letterSpacing:1 }}>
                            🏆 GRANDE FINAL COPA 2026
                          </div>
                          <div className="bracket-match anim-cascade" style={{ border:`2px solid ${C.amber}`, maxWidth:200, margin:"0 auto", animationDelay:"0.3s", padding:"8px", boxShadow:"0 4px 14px rgba(217,119,6,0.15)" }}>
                            <div className="bracket-team" style={{ color:"var(--text-muted)", fontSize:14, padding:"8px 0" }}>A Definir</div>
                            <div style={{ fontSize:10, color:"var(--border-color)", margin:"2px 0", fontWeight:800 }}>VS</div>
                            <div className="bracket-team" style={{ borderBottom:"none", color:"var(--text-muted)", fontSize:14, padding:"8px 0" }}>A Definir</div>
                          </div>
                        </div>
                      )}

                    </div>
                  </div>
                </div>
              )}

              {/* ─────────────────────────────────────────────────
                 ABA: GRÁFICOS
              ───────────────────────────────────────────────── */}
              {aba === "graficos" && (
                <div className="anim-cascade">
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                    <h2 style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:900, letterSpacing:1, textTransform:"uppercase", color:"var(--text-main)", margin:0 }}>
                      Evolução do Top 5
                    </h2>
                    <div style={{ fontSize:12, color:C.blue, background:"var(--bg-input-focus)", border:`1px solid ${C.blue}`, borderRadius:6, padding:"6px 12px", fontWeight:600 }}>
                      📈 Acumulado de pontos por jogo
                    </div>
                  </div>

                  {JOGOS_COPA.filter(j => resultados[j.id]).length === 0
                    ? (
                      <div style={{ background:"var(--bg-card)", borderRadius:10, border:"1px solid var(--border-color)", padding:"60px 24px", textAlign:"center", color:"var(--text-muted)", fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:16 }}>
                        Aguardando resultados para gerar o gráfico.
                      </div>
                    )
                    : (
                      <div style={{ background:"var(--bg-card)", borderRadius:10, border:"1px solid var(--border-color)", padding:24, boxShadow:"var(--shadow-card)" }}>
                        <div style={{ position:"relative", height:480, width:"100%" }}>
                          <canvas id="evolutionChart"></canvas>
                        </div>
                      </div>
                    )
                  }
                </div>
              )}

            </main>

            {/* ══ NAVEGAÇÃO INFERIOR (MOBILE) ═════════════════════ */}
            <nav className="bottom-nav" aria-label="Navegação principal">
              {ABAS.map(a => (
                <button
                  key={a.id}
                  type="button"
                  className={`nav-item ${aba === a.id ? "active" : ""}`}
                  onClick={() => setAba(a.id)}
                >
                  <span className="icon">{a.icon}</span>
                  <span className="label">{a.label}</span>
                </button>
              ))}
            </nav>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<Bolao />);
    </script>
  </body>
</html>
