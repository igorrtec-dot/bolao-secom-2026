<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>⚽ BOLÃO DA SECOM 2026</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

      :root {
        --accent:         #1a6ef5;
        --bg-body:        #f0f2f5;
        --bg-card:        #ffffff;
        --text-main:      #111827;
        --text-muted:     #6b7280;
        --border-color:   #e5e7eb;
        --bg-input:       #f8fafc;
        --bg-input-focus: #eef4ff;
        --bg-row-even:    #f8fafc;
        --bg-top1:        #eef4ff;
        --bg-top2:        #f8fafc;
        --bg-top3:        #fffbf0;
        --header-bg:      #0a0a0a;
        --nav-bg:         #ffffff;
        --btn-out-bg:     #ffffff;
        --shadow-card:    0 2px 12px rgba(0,0,0,0.07);
        --shadow-nav:     0 -4px 24px rgba(0,0,0,0.1);
        --logo-bg:        #000000;
        --safe-bottom:    env(safe-area-inset-bottom, 0px);
        --safe-top:       env(safe-area-inset-top, 0px);
      }

      body.dark-mode {
        --bg-body:        #0f172a;
        --bg-card:        #1e293b;
        --text-main:      #f1f5f9;
        --text-muted:     #94a3b8;
        --border-color:   #334155;
        --bg-input:       #0f172a;
        --bg-input-focus: rgba(26,110,245,0.15);
        --bg-row-even:    #182235;
        --bg-top1:        rgba(26,110,245,0.12);
        --bg-top2:        rgba(148,163,184,0.08);
        --bg-top3:        rgba(217,119,6,0.1);
        --header-bg:      #020617;
        --nav-bg:         #0f172a;
        --btn-out-bg:     #1e293b;
        --shadow-card:    0 4px 16px rgba(0,0,0,0.3);
        --shadow-nav:     0 -4px 24px rgba(0,0,0,0.45);
      }

      body {
        margin: 0;
        background: var(--bg-body);
        font-family: 'Barlow', 'Segoe UI', sans-serif;
        overflow-x: hidden;
        color: var(--text-main);
        padding-bottom: calc(76px + var(--safe-bottom));
        -webkit-font-smoothing: antialiased;
      }

      ::placeholder { color: var(--text-muted); opacity: 0.55; }
      input, button { font-family: inherit; }
      input[type="text"], input[type="number"], input[type="search"], input[type="password"] {
        font-size: 16px !important;
      }

      /* ─── SPLASH ─────────────────────────────────────────────── */
      #splash-screen {
        position: fixed; inset: 0; z-index: 9999;
        background: var(--header-bg);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 20px; transition: opacity 0.45s ease, visibility 0.45s ease;
        padding-top: var(--safe-top);
      }
      #splash-screen.hide { opacity: 0; visibility: hidden; pointer-events: none; }
      .splash-logo-wrap {
        width: 112px; height: 132px; background: var(--logo-bg);
        border-radius: 18px; display: flex; align-items: center; justify-content: center;
        padding: 14px; box-shadow: 0 12px 40px rgba(26,110,245,0.22);
        border: 1px solid rgba(255,255,255,0.08);
        animation: pulseLogo 2s ease-in-out infinite;
      }
      .splash-logo-wrap img { width: 100%; height: 100%; object-fit: contain; object-position: center; }
      .splash-title {
        font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 24px;
        letter-spacing: 3px; color: #fff; text-transform: uppercase; margin: 0;
      }
      .splash-sub {
        font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4);
        letter-spacing: 4px; text-transform: uppercase; margin: 0;
      }
      @keyframes pulseLogo {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.03); }
      }

      /* ─── LOGO ───────────────────────────────────────────────── */
      .app-logo-wrap {
        flex-shrink: 0; background: var(--logo-bg); border-radius: 10px;
        display: flex; align-items: center; justify-content: center; overflow: hidden;
        border: 1px solid rgba(255,255,255,0.1);
      }
      .app-logo-wrap img { width: 100%; height: 100%; object-fit: contain; object-position: center; display: block; }
      .app-logo-header { width: 44px; height: 44px; padding: 5px; }

      /* ─── HEADER MOBILE ───────────────────────────────────────── */
      .app-header {
        background: var(--header-bg);
        position: sticky; top: 0; z-index: 100;
        padding: calc(10px + var(--safe-top)) 16px 10px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      }
      .app-header-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .app-header-brand { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
      .app-header-title {
        font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 900;
        letter-spacing: 1.5px; color: #fff; margin: 0; text-transform: uppercase; line-height: 1.1;
      }
      .app-header-sub { font-size: 9px; color: rgba(255,255,255,0.45); font-weight: 700; letter-spacing: 1px; margin-top: 2px; }
      .app-header-actions { display: flex; gap: 6px; flex-shrink: 0; }
      .icon-btn {
        background: rgba(255,255,255,0.12); border: none; border-radius: 10px;
        width: 40px; height: 40px; font-size: 18px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.2s, transform 0.15s;
      }
      .icon-btn:active { transform: scale(0.94); }
      .icon-btn.primary { background: var(--accent); }
      .icon-btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .progress-wrap { margin-top: 10px; }
      .progress-label {
        display: flex; justify-content: space-between; font-size: 9px; font-weight: 700;
        color: rgba(255,255,255,0.45); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px;
      }
      .progress-bar {
        height: 4px; background: rgba(255,255,255,0.12); border-radius: 99px; overflow: hidden;
      }
      .progress-fill {
        height: 100%; background: linear-gradient(90deg, var(--accent), #60a5fa);
        border-radius: 99px; transition: width 0.4s ease;
      }

      .sync-bar {
        display: flex; align-items: center; justify-content: space-between; gap: 8px;
        margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.07);
        flex-wrap: wrap;
      }
      .sync-status { display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1; }
      .sync-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
      .sync-text { font-size: 10px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .sync-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
      .sync-toggle { font-size: 10px; color: rgba(255,255,255,0.45); display: flex; align-items: center; gap: 4px; font-weight: 600; cursor: pointer; }
      .sync-toggle input { width: 14px; height: 14px; }

      /* ─── BOTTOM NAV ─────────────────────────────────────────── */
      .bottom-nav {
        position: fixed; bottom: 0; left: 0; width: 100%;
        background: var(--nav-bg); box-shadow: var(--shadow-nav);
        display: flex; justify-content: space-around; align-items: center;
        padding: 4px 2px calc(8px + var(--safe-bottom));
        z-index: 1000; border-top: 1px solid var(--border-color);
      }
      .nav-item {
        background: transparent; border: none; outline: none;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: var(--text-muted); padding: 4px 2px; flex: 1; border-radius: 10px;
        min-width: 0; transition: color 0.2s, transform 0.15s;
      }
      .nav-item.active { color: var(--accent); }
      .nav-item:active { transform: scale(0.92); }
      .nav-item .icon { font-size: 20px; line-height: 1; margin-bottom: 2px; }
      .nav-item.active .icon { transform: scale(1.1); }
      .nav-item .label {
        font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 800;
        text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap;
      }

      /* ─── MAIN ───────────────────────────────────────────────── */
      .app-main { padding: 16px; max-width: 640px; margin: 0 auto; }
      .section-title {
        font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 900;
        text-transform: uppercase; color: var(--text-main); margin: 0 0 14px; letter-spacing: 0.5px;
      }

      /* ─── ANIMAÇÕES ─────────────────────────────────────────── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .anim-cascade { animation: fadeUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }

      @keyframes pulseLive { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
      .live-badge {
        background: #dc2626; color: #fff; border-radius: 4px; padding: 2px 5px;
        font-size: 9px; font-weight: 900; font-family: 'Barlow Condensed', sans-serif;
        letter-spacing: 0.4px; animation: pulseLive 1.2s infinite;
        display: inline-block; vertical-align: middle; margin-left: 4px;
      }

      .score-5pt { background: #1a6ef5 !important; color: #fff !important; border-color: #1a6ef5 !important; }
      .score-3pt { background: #16a34a !important; color: #fff !important; border-color: #16a34a !important; }
      .score-0pt { background: #dc2626 !important; color: #fff !important; border-color: #dc2626 !important; }

      /* ─── CARDS & STATS ─────────────────────────────────────── */
      .scroll-carousel {
        display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px;
        scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; margin-bottom: 16px;
      }
      .scroll-carousel::-webkit-scrollbar { display: none; }
      .stat-card {
        min-width: 200px; scroll-snap-align: start; flex-shrink: 0;
        background: var(--bg-card); border-radius: 14px; padding: 14px 16px;
        border: 1px solid var(--border-color); box-shadow: var(--shadow-card);
      }
      .stat-icon  { font-size: 20px; margin-bottom: 2px; }
      .stat-title {
        font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
        color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
      }
      .stat-value {
        font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
        color: var(--text-main); font-size: 17px; margin: 4px 0; line-height: 1.15;
      }
      .stat-sub { font-size: 10px; color: var(--text-muted); font-weight: 600; }

      .card {
        background: var(--bg-card); border-radius: 14px; border: 1px solid var(--border-color);
        box-shadow: var(--shadow-card); padding: 12px;
      }
      .rank-row {
        display: flex; align-items: center; gap: 10px; padding: 12px 8px;
        border-bottom: 1px solid var(--border-color);
      }
      .rank-row:last-child { border-bottom: none; }

      .dashboard-grid { display: flex; flex-direction: column; gap: 16px; }
      .stats-sidebar { display: flex; flex-direction: column; gap: 10px; }
      .stats-sidebar .stat-card { min-width: unset; }

      /* ─── FILTROS & BOTÕES ──────────────────────────────────── */
      .filter-btn {
        background: var(--bg-card); border: 1.5px solid var(--border-color);
        border-radius: 20px; padding: 7px 14px; font-size: 12px; font-weight: 700;
        font-family: 'Barlow Condensed', sans-serif; color: var(--text-muted);
        white-space: nowrap; flex-shrink: 0; cursor: pointer;
      }
      .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

      .btn-primary {
        background: var(--accent); color: #fff; border: none; border-radius: 12px;
        padding: 14px; font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
        font-size: 15px; letter-spacing: 0.5px; text-transform: uppercase;
        width: 100%; cursor: pointer;
      }
      .btn-primary:active { opacity: 0.9; transform: scale(0.99); }
      .btn-secondary {
        background: var(--btn-out-bg); color: var(--accent); border: 1.5px solid var(--accent);
        border-radius: 10px; padding: 10px 14px; font-family: 'Barlow Condensed', sans-serif;
        font-weight: 800; font-size: 12px; text-transform: uppercase; cursor: pointer;
      }
      .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }

      .score-input {
        width: 72px; height: 44px; border-radius: 10px; font-size: 16px;
        text-align: center; font-family: monospace; font-weight: 800;
        border: 2px solid var(--border-color); background: var(--bg-input); color: var(--text-main);
        outline: none;
      }
      .score-input:focus { border-color: var(--accent); background: var(--bg-input-focus); }

      .game-row {
        display: flex; align-items: center; justify-content: space-between;
        gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border-color);
      }
      .game-row:last-child { border-bottom: none; }
      .game-teams { font-weight: 700; font-size: 14px; line-height: 1.25; }
      .game-meta { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

      /* ─── TABELAS ─────────────────────────────────────────────── */
      .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 10px; }
      .table-sticky { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 11px; }
      .table-sticky th, .table-sticky td { padding: 9px 8px; border-bottom: 1px solid var(--border-color); white-space: nowrap; }
      .table-sticky thead th { background: var(--header-bg); color: #fff; font-weight: 800; }
      .table-sticky th:first-child, .table-sticky td:first-child { position: sticky; left: 0; z-index: 2; background: inherit; }
      .table-sticky thead th:first-child { z-index: 3; background: var(--header-bg); }
      .table-sticky td:first-child { background: var(--bg-card); box-shadow: 2px 0 6px rgba(0,0,0,0.04); font-weight: 700; }

      .tables-split-container { display: flex; flex-direction: column; gap: 16px; margin-top: 20px; }

      /* ─── TOOLTIPS ────────────────────────────────────────────── */
      .badge-tooltip { position: relative; display: inline-block; }
      .badge-tooltip .tooltiptext {
        visibility: hidden; width: 140px; background: var(--text-main); color: var(--bg-card);
        text-align: center; border-radius: 6px; padding: 5px 8px;
        position: absolute; z-index: 10; bottom: 125%; left: 50%; margin-left: -70px;
        opacity: 0; transition: opacity 0.2s; font-size: 10px; font-weight: 600; pointer-events: none;
      }
      .badge-tooltip:active .tooltiptext { visibility: visible; opacity: 1; }

      /* ─── CHAVEAMENTO ───────────────────────────────────────── */
      .bracket-col { display: flex; flex-direction: column; justify-content: space-around; flex: 1; min-width: 0; }
      .bracket-match {
        background: var(--bg-card); border: 1px solid var(--border-color);
        border-radius: 8px; padding: 6px 8px;
        font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 11px;
        color: var(--text-main); box-shadow: var(--shadow-card); margin-bottom: 6px;
      }
      .bracket-team { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 3px 0; }
      .bracket-team:first-child { border-bottom: 1px solid var(--border-color); }

      .desktop-only { display: none !important; }
      .tabs-wrapper { display: none; }

      .theme-btn {
        background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
        color: #fff; border-radius: 8px; padding: 6px 12px; cursor: pointer;
        font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 12px;
        text-transform: uppercase;
      }

      /* ─── DESKTOP (opcional) ─────────────────────────────────── */
      @media (min-width: 769px) {
        body { padding-bottom: 0; max-width: 1060px; margin: 0 auto; }
        .bottom-nav { display: none; }
        .desktop-only { display: flex !important; }
        .tabs-wrapper { display: flex; background: var(--accent); overflow-x: auto; }
        .app-main { max-width: 1060px; padding: 24px 16px; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .tables-split-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .scroll-carousel .stat-card { min-width: 220px; }
        .app-header-title { font-size: 22px; }
      }
    </style>
  </head>

  <body>
    <div id="splash-screen">
      <div class="splash-logo-wrap">
        <img src="Logo.jpg" alt="Copa do Mundo FIFA 2026" />
      </div>
      <p class="splash-title">Bolão SECOM</p>
      <p class="splash-sub">Copa do Mundo 2026</p>
    </div>

    <div id="root"></div>

    <script type="text/babel" data-presets="env,react">
      const { useState, useMemo, useEffect, useCallback, useRef } = React;

      const API_FOOTBALL_KEY = "e4e06be299b8420da11d34a38b292430";

      /* ─── PALETA DE CORES CENTRALIZADA ───────────────────── */
      const C = {
        blue:   "#1a6ef5",
        green:  "#16a34a",
        red:    "#dc2626",
        amber:  "#d97706",
        white:  "#ffffff",
        black:  "#0a0a0a",
        grayLt: "#e5e7eb",
      };

      /* ════════════════════════════════════════════════════════════
         UTILITÁRIOS DE PONTUAÇÃO E NORMALIZAÇÃO
      ════════════════════════════════════════════════════════════ */
      const validarPlacar = (str) => /^\d{1,2}-\d{1,2}$/.test((str || "").trim());

      const normalizarPlacar = (str) => {
        const raw = (str || "").trim().toUpperCase().replace(/X/g, "-");
        const m = raw.match(/^(\d{1,2})\s*[-–]?\s*(\d{1,2})$/);
        return m ? `${Number(m[1])}-${Number(m[2])}` : raw;
      };

      const jogoJaComecou = (jogo) => Date.now() >= parseDateTime(jogo.data, jogo.hora);

      const calcularPontos = (palpite, resultado) => {
        if (!resultado || !palpite) return null;
        if (!validarPlacar(palpite) || !validarPlacar(resultado)) return null;

        const [pg, pv] = palpite.split("-").map(Number);
        const [rg, rv] = resultado.split("-").map(Number);

        if (pg === rg && pv === rv) return 5;

        const vencedorPalpite   = pg > pv ? "A" : pg < pv ? "B" : "E";
        const vencedorResultado = rg > rv ? "A" : rg < rv ? "B" : "E";

        return vencedorPalpite === vencedorResultado ? 3 : 0;
      };

      const parseDateTime = (data, hora) => {
        if (!data || !hora) return 0;
        const [dia, mes]    = data.split("/").map(Number);
        const [hStr, mStr]  = hora.replace("h", ":").split(":");
        const h = Number(hStr) || 0;
        const m = Number(mStr) || 0;
        return new Date(2026, mes - 1, dia, h, m).getTime();
      };

      const NOME_MAP = {
        "Mexico":"México","South Africa":"África do Sul","Korea Republic":"Coreia do Sul",
        "South Korea":"Coreia do Sul","Czechia":"República Tcheca","Czech Republic":"República Tcheca",
        "Canada":"Canadá","Bosnia-Herzegovina":"Bósnia e Herzegovina",
        "Bosnia and Herzegovina":"Bósnia e Herzegovina","Qatar":"Catar","Switzerland":"Suíça",
        "Brazil":"Brasil","Morocco":"Marrocos","Haiti":"Haiti","Scotland":"Escócia",
        "United States":"Estados Unidos","USA":"Estados Unidos","Paraguay":"Paraguai",
        "Australia":"Austrália","Turkey":"Turquia","Türkiye":"Turquia","Germany":"Alemanha",
        "Curacao":"Curaçao","Ivory Coast":"Costa do Marfim","Côte d'Ivoire":"Costa do Marfim",
        "Ecuador":"Equador","Netherlands":"Holanda","Japan":"Japão","Sweden":"Suécia",
        "Tunisia":"Tunísia","Belgium":"Bélgica","Egypt":"Egito","Iran":"Irã",
        "New Zealand":"Nova Zelândia","Spain":"Espanha","Cape Verde":"Cabo Verde",
        "Cape Verde Islands":"Cabo Verde","Saudi Arabia":"Arábia Saudita","Uruguay":"Uruguai",
        "France":"França","Senegal":"Senegal","Iraq":"Iraque","Norway":"Noruega",
        "Argentina":"Argentina","Algeria":"Argélia","Austria":"Áustria","Jordan":"Jordânia",
        "Portugal":"Portugal","DR Congo":"RD Congo","Congo DR":"RD Congo",
        "Uzbekistan":"Uzbequistão","Colombia":"Colômbia","England":"Inglaterra",
        "Croatia":"Croácia","Ghana":"Gana","Panama":"Panamá",
      };
      const normalizarNome = (n) => NOME_MAP[n] || n;

      const limpaNome = (s) =>
        (s || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();

      /* ════════════════════════════════════════════════════════════
         DADOS: JOGOS DA COPA DO MUNDO 2026
      ════════════════════════════════════════════════════════════ */
      const JOGOS_COPA = [
        {id:1,  grupo:"A",rodada:1,mandante:"México",              visitante:"África do Sul",       data:"11/06",hora:"16h",  local:"Cidade do México"},
        {id:2,  grupo:"A",rodada:1,mandante:"Coreia do Sul",       visitante:"República Tcheca",    data:"11/06",hora:"23h",  local:"Guadalajara"},
